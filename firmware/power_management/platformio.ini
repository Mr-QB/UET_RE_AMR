; PlatformIO Configuration for UET AMR Power Management Board

[env:power_management]
platform = ststm32
board = nucleo_f103rb
framework = arduino

upload_port = COM5
monitor_port = COM5
monitor_speed = 9600

build_flags =
  -D VBAT_DIVIDER_RATIO=3.0
  -D LOW_BATTERY_THRESHOLD_V=10.5
  -D CRITICAL_BATTERY_THRESHOLD_V=9.5

lib_deps =
  micro-ROS/micro_ros_arduino
