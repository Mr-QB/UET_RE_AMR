; PlatformIO Configuration for UET AMR Base Controller
; Target: STM32F4 series (adjust board to your hardware)
; Protocol: micro-ROS over UART

[env:base_controller]
platform = ststm32
board = nucleo_f446re        ; Change to your board: nucleo_f446re, blackpill_f411ce, etc.
framework = arduino

; Serial port for flashing
upload_port = COM3            ; Change to your port (Linux: /dev/ttyUSB0)
monitor_port = COM3
monitor_speed = 115200

; Build flags
build_flags =
  -D MICRO_ROS_TRANSPORT_SERIAL
  -D ENCODER_RESOLUTION=1024
  -D WHEEL_RADIUS_MM=65
  -D WHEEL_BASE_MM=350
  -D MAX_RPM=200
  -D PID_SAMPLE_TIME_MS=10

; Libraries
lib_deps =
  micro-ROS/micro_ros_arduino       ; micro-ROS for ROS2 communication
  br3ttb/PID@^1.2.1                 ; PID controller
  madhephaestus/ESP32Encoder@^0.10.1 ; (use appropriate encoder lib for your MCU)

; Extra scripts
extra_scripts = scripts/post_build.py
