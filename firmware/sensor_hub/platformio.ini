; PlatformIO Configuration for UET AMR Sensor Hub
; Target: ESP32 or STM32 — IMU, Ultrasonic, Environmental sensors

[env:sensor_hub]
platform = espressif32
board = esp32dev
framework = arduino

upload_port = COM4
monitor_port = COM4
monitor_speed = 115200

build_flags =
  -D MICRO_ROS_TRANSPORT_SERIAL
  -D IMU_SAMPLE_RATE_HZ=100

lib_deps =
  micro-ROS/micro_ros_arduino
  adafruit/Adafruit BNO055@^1.6.3       ; IMU
  adafruit/Adafruit_BusIO@^1.14.5
  NewPing                                ; Ultrasonic sensors
